services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_pigeon
      POSTGRES_USER: crypto_pigeon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_pigeon -d crypto_pigeon"]
      interval: 5s
      timeout: 5s
      retries: 12
  relay:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # The relay constructs DATABASE_URL at startup with percent encoding, so
      # a generated password may safely contain URI-reserved characters.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      DATABASE_HOST: postgres
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME in .env}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      ACTIVATION_PEPPER: ${ACTIVATION_PEPPER:?set ACTIVATION_PEPPER in .env}
      RELAY_HOSTNAME: 127.0.0.1:8443
      HOST: 0.0.0.0
      PORT: 8443
    ports:
      - "127.0.0.1:8443:8443"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8443/readyz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
volumes:
  postgres_data:
